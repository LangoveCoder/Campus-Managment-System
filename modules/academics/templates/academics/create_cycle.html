{% extends 'base.html' %}
{% block title %}Create Cycle - Academics{% endblock %}

{% block content %}
<div class="content-header">
    <div class="header-left">
        <a href="{% url 'program_detail' program.id %}" class="back-link">← Back to {{ program.name }}</a>
        <h1>Create New Academic Cycle</h1>
    </div>
</div>

{% if error %}
<div class="alert error">
    {{ error }}
</div>
{% endif %}

<div class="card">
    <form method="POST" action="{% url 'create_cycle' program.id %}" class="details-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Cycle Name*</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Fall 2026">
        </div>
        <div class="form-group">
            <label for="start_date">Start Date*</label>
            <input type="date" id="start_date" name="start_date" required>
        </div>
        <div class="form-group">
            <label for="end_date">End Date*</label>
            <input type="date" id="end_date" name="end_date" required>
        </div>
        <div class="form-actions">
            <a href="{% url 'program_detail' program.id %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Cycle</button>
        </div>
    </form>
</div>
{% endblock %}
