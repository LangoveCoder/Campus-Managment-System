<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document — Campus Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
        }

        .upload-card {
            max-width: 520px;
            margin: 60px auto;
        }
    </style>
</head>

<body>
    <div class="upload-card">
        <div class="text-center mb-4">
            <h1 class="h5 fw-bold" style="color:#1e293b;">Applicant Document Upload</h1>
            <p class="text-muted small">Upload your profile photo or a supporting document.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">{{ success }} You may close this window.</div>
        {% else %}
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data" action="/media-assets/applicant-upload/">
                    {% csrf_token %}

                    <input type="hidden" name="entity_type" value="applicant">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Document Type</label>
                        <select name="asset_type" class="form-select" required>
                            <option value="">— Select —</option>
                            <option value="profile_photo">Profile Photo</option>
                            <option value="document">Supporting Document</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Application ID</label>
                        <input type="text" name="entity_id" class="form-control" required
                            placeholder="Your application reference number">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Campus ID</label>
                        <input type="text" name="campus_id" class="form-control" required
                            placeholder="Campus code (provided in your admission letter)">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">File</label>
                        <input type="file" name="file" class="form-control" required accept=".jpg,.jpeg,.png,.pdf">
                        <div class="form-text text-muted">JPEG, PNG or PDF only. Maximum 5 MB.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Submit</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
</body>

</html>
