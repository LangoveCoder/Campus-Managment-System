{% extends "base.html" %}
{% block content %}

<div class="mb-4">
    <h1 class="h3">Add Timetable Slot</h1>
    <p class="text-muted">Fill in the slot details below.</p>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card shadow-sm" style="max-width: 580px;">
    <div class="card-body p-4">
        <form method="post" action="/timetable/add/">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Class Group</label>
                <select name="class_group_id" class="form-select" required>
                    {% for cg in class_groups %}
                    <option value="{{ cg.id }}" {% if cg.id|stringformat:"s" == preselect %}selected{% endif %}>
                        {{ cg.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label fw-semibold">Day</label>
                    <select name="day" class="form-select" required>
                        {% for code, label in days %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label fw-semibold">Period</label>
                    <select name="period" class="form-select" required>
                        {% for code, label in periods %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Course Name</label>
                <input type="text" name="course_name" class="form-control" required placeholder="e.g. Physics">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Teacher Name <span class="text-muted fw-normal">(optional)</span>
                </label>
                <input type="text" name="teacher_name" class="form-control" placeholder="e.g. Mr. Ahmed">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Room <span class="text-muted fw-normal">(optional)</span>
                </label>
                <select name="room_fk_id" class="form-select">
                    <option value="">— None —</option>
                    {% for room in rooms %}
                    <option value="{{ room.id }}">{{ room.name }} ({{ room.get_room_type_display }}, cap. {{
                        room.capacity }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Slot</button>
                <a href="/timetable/?class_group_id={{ preselect }}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
