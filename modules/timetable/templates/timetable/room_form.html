{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <h1 class="h3">Add Room</h1>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:480px;">
    <div class="card-body">
        <form method="post" action="/timetable/rooms/add/">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Room Name</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Room 3, Physics Lab">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Type</label>
                <select name="room_type" class="form-select">
                    {% for code, label in room_types %}
                    <option value="{{ code }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Capacity</label>
                <input type="number" name="capacity" class="form-control" value="30" min="1" max="500">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Room</button>
                <a href="/timetable/rooms/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
