{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Edit Profile — {{ person.full_name }}</h4>
    <a href="javascript:history.back()" class="btn btn-secondary btn-sm">Back</a>
</div>

{% if success %}
<div class="alert alert-success">{{ success }}</div>
{% endif %}
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post">
{% csrf_token %}
<div class="row g-4">

  <div class="col-12"><h6 class="text-muted text-uppercase">Personal Details</h6></div>

  <div class="col-md-4">
    <label class="form-label">Date of Birth</label>
    <input type="date" name="date_of_birth" class="form-control"
      value="{{ profile.date_of_birth|date:'Y-m-d'|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Blood Group</label>
    <select name="blood_group" class="form-select">
      <option value="">— Select —</option>
      {% for val, label in blood_group_choices %}
      <option value="{{ val }}" {% if profile.blood_group|stringformat:"s" == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">CNIC / B-Form</label>
    <input type="text" name="cnic" class="form-control" placeholder="35202-1234567-1"
      value="{{ profile.cnic|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Phone</label>
    <input type="text" name="phone" class="form-control"
      value="{{ profile.phone|default:'' }}">
  </div>
  <div class="col-md-8">
    <label class="form-label">Address</label>
    <input type="text" name="address" class="form-control"
      value="{{ profile.address|default:'' }}">
  </div>

  <div class="col-12 mt-2"><h6 class="text-muted text-uppercase">Family Information</h6></div>

  <div class="col-md-4">
    <label class="form-label">Father's Name</label>
    <input type="text" name="father_name" class="form-control"
      value="{{ profile.father_name|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Mother's Name</label>
    <input type="text" name="mother_name" class="form-control"
      value="{{ profile.mother_name|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Guardian Name</label>
    <input type="text" name="guardian_name" class="form-control"
      value="{{ profile.guardian_name|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Guardian Phone</label>
    <input type="text" name="guardian_phone" class="form-control"
      value="{{ profile.guardian_phone|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Guardian Relation</label>
    <input type="text" name="guardian_relation" class="form-control"
      value="{{ profile.guardian_relation|default:'' }}">
  </div>

  <div class="col-12 mt-2"><h6 class="text-muted text-uppercase">Emergency Contact</h6></div>

  <div class="col-md-4">
    <label class="form-label">Emergency Contact Name</label>
    <input type="text" name="emergency_contact_name" class="form-control"
      value="{{ profile.emergency_contact_name|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Emergency Contact Phone</label>
    <input type="text" name="emergency_contact_phone" class="form-control"
      value="{{ profile.emergency_contact_phone|default:'' }}">
  </div>

  <div class="col-12 mt-2"><h6 class="text-muted text-uppercase">Academic / Professional</h6></div>

  <div class="col-md-4">
    <label class="form-label">Previous Institution</label>
    <input type="text" name="previous_institution" class="form-control"
      value="{{ profile.previous_institution|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Qualification</label>
    <input type="text" name="qualification" class="form-control"
      value="{{ profile.qualification|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Specialization</label>
    <input type="text" name="specialization" class="form-control"
      value="{{ profile.specialization|default:'' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Join Date</label>
    <input type="date" name="join_date" class="form-control"
      value="{{ profile.join_date|date:'Y-m-d'|default:'' }}">
  </div>

  <div class="col-12 mt-2">
    <button type="submit" class="btn btn-success">Save Profile</button>
  </div>

</div>
</form>
{% endblock %}
